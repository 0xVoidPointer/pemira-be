openapi: 3.0.3
info:
  title: Pemira API
  description: Election management system API for student elections (Pemira).
  version: 1.0.0
servers:
  - url: /
    description: Default server

tags:
  - name: Health
  - name: Auth
  - name: Election (Active)
  - name: Election Periods
  - name: Election Categories
  - name: Faculties
  - name: Candidates
  - name: Students
  - name: Ballots
  - name: Vote Tallies

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/admin/auth:
    post:
      tags: [Auth]
      summary: Admin login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestAdmin'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseAdmin'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/election/active-period:
    get:
      tags: [Election (Active)]
      summary: Get active election period
      responses:
        '200':
          description: Active election period
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ElectionPeriod'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/election/active-period/categories:
    get:
      tags: [Election (Active)]
      summary: List categories of active period (scoped to caller)
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ElectionCategory'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/election/active-period/vision-mission:
    get:
      tags: [Election (Active)]
      summary: Vision-mission showcase for a category in active period
      parameters:
        - in: query
          name: category
          required: true
          schema:
            type: string
            format: uuid
          description: Category id (UUID) within the active election period
      responses:
        '200':
          description: Category metadata + showcase candidates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisionMissionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/election/categories/{categoryId}/candidates:
    get:
      tags: [Election (Active)]
      summary: List candidates of an active category
      parameters:
        - $ref: '#/components/parameters/CategoryIdPath'
      responses:
        '200':
          description: List of candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CandidateWithMembers'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/periods:
    get:
      tags: [Election Periods]
      summary: List all election periods
      responses:
        '200':
          description: Periods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ElectionPeriod'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Election Periods]
      summary: Create election period (superadmin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateElectionPeriodRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateElectionPeriodResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/periods/{year}:
    parameters:
      - $ref: '#/components/parameters/YearPath'
    get:
      tags: [Election Periods]
      summary: Get period by year
      responses:
        '200':
          description: Period
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ElectionPeriod'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Election Periods]
      summary: Update period (superadmin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateElectionPeriodRequest'
      responses:
        '200':
          description: Updated period
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ElectionPeriod'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Election Periods]
      summary: Delete period (superadmin)
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/periods/{year}/categories:
    parameters:
      - $ref: '#/components/parameters/YearPath'
    get:
      tags: [Election Categories]
      summary: List categories for a period
      responses:
        '200':
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ElectionCategory'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Election Categories]
      summary: Create category in a period (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateElectionCategoryRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateElectionCategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/periods/{year}/categories/{id}:
    parameters:
      - $ref: '#/components/parameters/YearPath'
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Election Categories]
      summary: Get category by ID
      responses:
        '200':
          description: Category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ElectionCategory'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Election Categories]
      summary: Update category (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateElectionCategoryRequest'
      responses:
        '200':
          description: Updated category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ElectionCategory'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Election Categories]
      summary: Delete category (superadmin)
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/faculties:
    get:
      tags: [Faculties]
      summary: List all faculties
      responses:
        '200':
          description: Faculties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Faculty'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Faculties]
      summary: Create faculty (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFacultyRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFacultyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/faculties/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Faculties]
      summary: Get faculty
      responses:
        '200':
          description: Faculty
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Faculty'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Faculties]
      summary: Update faculty (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFacultyRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Faculty'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Faculties]
      summary: Delete faculty (superadmin)
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/categories/{categoryId}/candidates:
    parameters:
      - $ref: '#/components/parameters/CategoryIdPath'
    get:
      tags: [Candidates]
      summary: List candidates of a category
      responses:
        '200':
          description: Candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CandidateWithMembers'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Candidates]
      summary: Create candidate in category (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCandidateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCandidateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/candidates/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Candidates]
      summary: Get candidate by ID
      responses:
        '200':
          description: Candidate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateWithMembers'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Candidates]
      summary: Update candidate (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCandidateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Candidate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Candidates]
      summary: Delete candidate (superadmin)
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/candidates/{id}/members:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Candidates]
      summary: Add member to candidate (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCandidateMemberRequest'
      responses:
        '201':
          description: Added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateMemberDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/candidates/{id}/members/{memberId}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
      - name: memberId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [Candidates]
      summary: Remove candidate member (admin)
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/students:
    get:
      tags: [Students]
      summary: List students (admin)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: faculty_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Students
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListStudentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/students/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Students]
      summary: Get student by ID (admin)
      responses:
        '200':
          description: Student
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/categories/{categoryId}/ballots:
    parameters:
      - $ref: '#/components/parameters/CategoryIdPath'
    get:
      tags: [Ballots]
      summary: List ballots for a category (admin)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: faculty_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ballots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBallotResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/categories/{categoryId}/ballots/stats:
    parameters:
      - $ref: '#/components/parameters/CategoryIdPath'
    get:
      tags: [Ballots]
      summary: Ballot stats for a category (admin)
      responses:
        '200':
          description: Stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BallotStatsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/categories/{categoryId}/tallies:
    parameters:
      - $ref: '#/components/parameters/CategoryIdPath'
    get:
      tags: [Vote Tallies]
      summary: Vote tally for a category (admin)
      responses:
        '200':
          description: Tally
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryTallyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/periods/{year}/tallies:
    parameters:
      - $ref: '#/components/parameters/YearPath'
    get:
      tags: [Vote Tallies]
      summary: Vote tally for a period (admin)
      responses:
        '200':
          description: Tally
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeriodTallyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    YearPath:
      name: year
      in: path
      required: true
      schema:
        type: integer
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CategoryIdPath:
      name: categoryId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
          format: int64

    PeriodStatus:
      type: string
      enum: [DRAFT, VOTING, DONE]

    ElectionCategoryType:
      type: string
      enum: [PRESIDENT, DPM, FACULTY_GOVERNOR]

    CandidateRole:
      type: string
      enum: [KETUA, WAKIL, INDIVIDUAL]

    LoginRequestAdmin:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          maxLength: 255
        password:
          type: string

    LoginResponseAdmin:
      type: object
      properties:
        token:
          type: string

    ElectionPeriod:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        year:
          type: integer
        theme_config:
          type: object
          additionalProperties: true
          nullable: true
        reg_start_at:
          type: string
          format: date-time
        reg_end_at:
          type: string
          format: date-time
        vote_start_at:
          type: string
          format: date-time
        vote_end_at:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/PeriodStatus'
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateElectionPeriodRequest:
      type: object
      required: [name, year, reg_start_at, reg_end_at, vote_start_at, vote_end_at]
      properties:
        name:
          type: string
          maxLength: 255
        year:
          type: integer
        theme_config:
          type: object
          additionalProperties: true
        reg_start_at:
          type: string
          format: date-time
        reg_end_at:
          type: string
          format: date-time
        vote_start_at:
          type: string
          format: date-time
        vote_end_at:
          type: string
          format: date-time

    CreateElectionPeriodResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid

    UpdateElectionPeriodRequest:
      type: object
      required: [name, reg_start_at, reg_end_at, vote_start_at, vote_end_at, status]
      properties:
        name:
          type: string
          maxLength: 255
        theme_config:
          type: object
          additionalProperties: true
          nullable: true
        reg_start_at:
          type: string
          format: date-time
        reg_end_at:
          type: string
          format: date-time
        vote_start_at:
          type: string
          format: date-time
        vote_end_at:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/PeriodStatus'

    ElectionCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        period_id:
          type: string
          format: uuid
        scope_faculty_id:
          type: string
          format: uuid
          nullable: true
        type:
          $ref: '#/components/schemas/ElectionCategoryType'
        title:
          type: string
        description:
          type: string
          nullable: true
        vote_start_at:
          type: string
          format: date-time
          nullable: true
        vote_end_at:
          type: string
          format: date-time
          nullable: true
        max_winners:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateElectionCategoryRequest:
      type: object
      required: [type, title]
      properties:
        scope_faculty_id:
          type: string
          format: uuid
          nullable: true
        type:
          $ref: '#/components/schemas/ElectionCategoryType'
        title:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        vote_start_at:
          type: string
          format: date-time
          nullable: true
        vote_end_at:
          type: string
          format: date-time
          nullable: true

    CreateElectionCategoryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid

    UpdateElectionCategoryRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        vote_start_at:
          type: string
          format: date-time
          nullable: true
        vote_end_at:
          type: string
          format: date-time
          nullable: true
        max_winners:
          type: integer

    Faculty:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        dean_name:
          type: string
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
