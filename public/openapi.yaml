openapi: 3.0.3
info:
  title: Pemira API
  description: Election management system API for student elections (Pemira).
  version: 1.0.0
servers:
  - url: /
    description: Default server

tags:
  - name: Health
  - name: Auth
  - name: Election (Active)

security:
  - bearerAuth: []

paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: server is up

  /api/student/auth:
    post:
      tags: [Auth]
      summary: Student login (by email or NIM)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestStudent'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/student/auth/verify:
    get:
      tags: [Auth]
      summary: Verify student JWT
      responses:
        '200':
          description: Token is valid
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/student/auth/logout:
    post:
      tags: [Auth]
      summary: Student logout (invalidate JWT)
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/election/active-period:
    get:
      tags: [Election (Active)]
      summary: Get active election period
      security: []
      responses:
        '200':
          description: Active election period
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ElectionPeriod'
        '409':
          description: No active election period
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/election/active-period/categories:
    get:
      tags: [Election (Active)]
      summary: List categories of active period (scoped to caller)
      parameters:
        - in: query
          name: type
          required: false
          schema:
            $ref: '#/components/schemas/ElectionCategoryType'
          description: Filter categories by type
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ElectionCategory'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: No active election period
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/election/active-period/categories/{categoryId}/candidates:
    get:
      tags: [Election (Active)]
      summary: List candidates of an active category
      parameters:
        - $ref: '#/components/parameters/CategoryIdPath'
      responses:
        '200':
          description: List of candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CandidateWithMembers'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: No active election period
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/election/active-period/votes:
    post:
      tags: [Election (Active)]
      summary: Cast votes for the active election period
      description: Submits a batch of votes (one per category) for the authenticated student. All categories scoped to the student must be voted on in the same request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoteRequest'
      responses:
        '200':
          description: Votes recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: No active election period or already voted in a category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CategoryIdPath:
      name: categoryId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Validation Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    PeriodStatus:
      type: string
      enum: [DRAFT, VOTING, DONE]

    ElectionCategoryType:
      type: string
      enum: [PRESIDENT, DPM, FACULTY_GOVERNOR]

    CandidateRole:
      type: string
      enum: [KETUA, WAKIL, INDIVIDUAL]

    LoginRequestStudent:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          maxLength: 255
          description: Student email or NIM
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string

    ElectionPeriod:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        year:
          type: integer
        theme_config:
          type: object
          additionalProperties: true
          nullable: true
        reg_start_at:
          type: string
          format: date-time
        reg_end_at:
          type: string
          format: date-time
        vote_start_at:
          type: string
          format: date-time
        vote_end_at:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/PeriodStatus'
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ElectionCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        period_id:
          type: string
          format: uuid
        scope_faculty_id:
          type: string
          format: uuid
          nullable: true
        type:
          $ref: '#/components/schemas/ElectionCategoryType'
        title:
          type: string
        description:
          type: string
          nullable: true
        vote_start_at:
          type: string
          format: date-time
          nullable: true
        vote_end_at:
          type: string
          format: date-time
          nullable: true
        max_winners:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Candidate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
        number:
          type: integer
        vision:
          type: string
        mission:
          type: string
        photo_url:
          type: string
          nullable: true
        video_url:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CandidateMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        candidate_id:
          type: string
          format: uuid
        student_id:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/CandidateRole'

    CandidateWithMembers:
      allOf:
        - $ref: '#/components/schemas/Candidate'
        - type: object
          properties:
            members:
              type: array
              items:
                $ref: '#/components/schemas/CandidateMember'

    VoteItem:
      type: object
      required: [category_id, candidate_id]
      properties:
        category_id:
          type: string
          format: uuid
        candidate_id:
          type: string
          format: uuid

    VoteRequest:
      type: object
      required: [votes]
      properties:
        votes:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/VoteItem'
